<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diagnóstico de Estudos</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3C573F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Estudos AGU">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --marca:#3C573F; --bg:#EDEBDF; --surface:#F9F8F1; --surface-2:#F2F0E6;
    --primary:#3C573F; --accent:#D9A441; --accent-soft:#e8c684;
    --text:#2D322B; --muted:#737a6b; --muted-2:#9aa08e; --line:#DBD8C7;
    --good:#3C573F; --warn:#C98B43; --bad:#B4543E;
    --shadow:0 10px 30px -12px rgba(45,50,43,.18);
    --shadow-sm:0 4px 14px -6px rgba(45,50,43,.14);
    font-size:16px;
  }
  [data-theme="dark"]{
    --marca:#5F8163; --bg:#171B14; --surface:#222820; --surface-2:#1c221a;
    --primary:#5F8163; --accent:#E0B05A; --accent-soft:#eccb8c;
    --text:#EEEBDD; --muted:#9ba48e; --muted-2:#6f7766; --line:#333A2E;
    --good:#7FA383; --warn:#E0B05A; --bad:#d98a72;
    --shadow:0 14px 34px -14px rgba(0,0,0,.55);
    --shadow-sm:0 6px 18px -8px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);}
  body{
    font-family:'Roboto',-apple-system,system-ui,sans-serif;color:var(--text);line-height:1.5;
    min-height:100dvh;padding-bottom:env(safe-area-inset-bottom);transition:background .4s,color .4s;
    overflow-x:hidden;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px 140px;}
  h1,h2,h3,.serif{font-family:'Fraunces','Roboto',serif;}

  /* Header */
  header{position:relative;padding:24px 0 8px;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .tg{position:absolute;top:18px;right:0;width:42px;height:42px;border-radius:50%;border:2px solid var(--accent);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:.3s;z-index:2;}
  .tg svg{width:19px;height:19px;stroke:var(--accent);fill:none;stroke-width:2;}
  .whale{height:58px;width:auto;max-width:220px;object-fit:contain;display:block;margin:6px auto 0;}
  .whale.dark{display:none;}
  [data-theme="dark"] .whale.light{display:none;}
  [data-theme="dark"] .whale.dark{display:block;}
  .apptitle{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:600;color:var(--text);letter-spacing:-.01em;line-height:1.1;margin-top:10px;}
  .appsub{font-family:'Roboto';font-size:.62rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
  .synced{display:inline-flex;align-items:center;gap:6px;font-size:.64rem;color:var(--primary);margin-top:10px;letter-spacing:.04em;font-weight:500;}
  .synced .dot{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 2.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(95,129,99,.5);}70%{box-shadow:0 0 0 7px rgba(95,129,99,0);}100%{box-shadow:0 0 0 0 rgba(95,129,99,0);}}

  /* Bottom nav */
  .tabs{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));
    display:flex;gap:2px;z-index:50;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:6px;box-shadow:var(--shadow);width:calc(100% - 30px);max-width:494px;}
  .tab{flex:1;border:none;background:transparent;color:var(--muted);font-family:'Roboto';font-size:.6rem;font-weight:600;
    padding:9px 2px;border-radius:999px;cursor:pointer;transition:.25s;display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:.02em;}
  .tab svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .tab.on{background:var(--primary);color:#fff;}
  [data-theme="dark"] .tab.on{color:#10140e;}

  .fab{position:fixed;right:16px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:55;
    width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;background:var(--accent);
    box-shadow:0 14px 30px -8px rgba(217,164,65,.55);display:flex;align-items:center;justify-content:center;transition:transform .25s;}
  .fab:active{transform:scale(.9);}
  .fab svg{width:26px;height:26px;stroke:#3a2c08;stroke-width:2.6;fill:none;}

  section{display:none;animation:rise .45s cubic-bezier(.2,.8,.2,1);}
  section.on{display:block;}
  @keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  .h2{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:500;margin:26px 0 3px;letter-spacing:-.01em;display:flex;align-items:baseline;gap:9px;}
  .h2 .tag{font-family:'Roboto';font-size:.6rem;font-weight:700;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;}
  .lede{color:var(--muted);font-size:.82rem;margin-bottom:16px;}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-sm);}

  /* Hero (overview) */
  .hero{display:flex;align-items:center;gap:18px;padding:20px;margin-top:18px;}
  .ring{flex-shrink:0;width:104px;height:104px;position:relative;}
  .ring svg{transform:rotate(-90deg);}
  .ring .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .ctr .v{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;line-height:1;color:var(--text);}
  .ring .ctr .l{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .hero .info .ey{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);}
  .hero .info .big{font-family:'Fraunces',serif;font-size:1.85rem;font-weight:600;line-height:1.05;margin:4px 0 4px;}
  .hero .info .sm{font-size:.78rem;color:var(--muted);line-height:1.4;}

  .secttl{font-size:.64rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:24px 0 11px;}

  /* List row card (HOJE style) */
  .lrow{display:flex;align-items:center;gap:14px;padding:15px 17px;margin-bottom:10px;}
  .lrow .ic{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .lrow .ic svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;}
  [data-theme="dark"] .lrow .ic svg{stroke:#10140e;}
  .lrow .lb{flex:1;min-width:0;}
  .lrow .lb .t{font-weight:500;font-size:.92rem;}
  .lrow .lb .s{font-size:.7rem;color:var(--muted);margin-top:1px;letter-spacing:.04em;text-transform:uppercase;}
  .lrow .val{font-family:'Fraunces',serif;font-size:1.45rem;font-weight:600;flex-shrink:0;}

  /* Diagnóstico */
  .block{border-radius:22px;padding:18px;margin-bottom:14px;border:1px solid var(--line);box-shadow:var(--shadow-sm);}
  .block.focus{background:linear-gradient(160deg,var(--surface),var(--surface-2));}
  .block.save{background:linear-gradient(160deg,var(--surface),var(--surface-2));}
  .block-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .pill{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 11px;border-radius:999px;}
  .pill.red{background:rgba(180,84,62,.14);color:var(--bad);}
  .pill.grn{background:rgba(60,87,63,.13);color:var(--primary);}
  [data-theme="dark"] .pill.grn{background:rgba(127,163,131,.18);}
  .block-head .ttl{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:500;}
  .row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);}
  .row:first-of-type{border-top:none;}
  .rank{font-family:'Fraunces',serif;font-size:1.1rem;width:22px;text-align:center;color:var(--muted-2);flex-shrink:0;}
  .row-body{flex:1;min-width:0;}
  .row-body .a{font-size:.86rem;font-weight:500;line-height:1.25;}
  .row-body .d{font-size:.68rem;color:var(--muted);margin-top:2px;}
  .metric{text-align:right;flex-shrink:0;}
  .metric .v{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:600;line-height:1;}
  .metric .c{font-size:.6rem;color:var(--muted);margin-top:3px;}
  .insight{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:15px;font-size:.82rem;color:var(--muted);line-height:1.55;margin-top:4px;}
  .insight b{color:var(--accent);font-weight:700;}.insight strong{color:var(--text);font-weight:600;}

  /* Ranking */
  .sortbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .chip{background:var(--surface);border:1px solid var(--line);color:var(--muted);font-family:'Roboto';font-size:.7rem;font-weight:600;padding:9px 14px;border-radius:999px;cursor:pointer;transition:.2s;}
  .chip.on{background:var(--primary);color:#fff;border-color:var(--primary);}
  [data-theme="dark"] .chip.on{color:#10140e;}
  .bar-item{padding:14px 16px;margin-bottom:10px;}
  .bar-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .bar-top .name{font-size:.85rem;font-weight:500;line-height:1.25;}
  .bar-top .disc{font-size:.62rem;color:var(--muted);margin-top:3px;letter-spacing:.04em;text-transform:uppercase;}
  .bar-top .pct{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600;flex-shrink:0;}
  .track{height:9px;background:var(--surface-2);border-radius:999px;overflow:hidden;border:1px solid var(--line);}
  .fill{height:100%;width:0;border-radius:999px;transition:width 1.1s cubic-bezier(.2,.85,.25,1);}
  .bar-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:.66rem;color:var(--muted);}
  .opp{color:var(--accent);font-weight:600;}

  /* Frentes */
  .acc{margin-bottom:11px;overflow:hidden;}
  .acc-head{display:flex;align-items:center;gap:13px;padding:16px;cursor:pointer;user-select:none;}
  .acc-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
  .acc-head .info2{flex:1;min-width:0;}
  .acc-head .nm{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:500;}
  .acc-head .meta{font-size:.66rem;color:var(--muted);margin-top:2px;}
  .acc-head .avg{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;}
  .chev{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;transition:.3s;flex-shrink:0;}
  .acc.open .chev{transform:rotate(180deg);}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
  .acc.open .acc-body{max-height:600px;}
  .acc-inner{padding:0 16px 8px;}
  .mini{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);}
  .mini .mn{flex:1;font-size:.78rem;}
  .mini .mq{font-size:.64rem;color:var(--muted);margin-top:1px;}
  .mini .mp{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;}

  /* Gráficos */
  .filters{margin-bottom:8px;}
  .filters .flab{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;}
  .chiprow{display:flex;gap:7px;flex-wrap:wrap;}
  .chart-card{padding:18px;margin-top:16px;}
  .chart-card .ct{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:500;margin-bottom:2px;}
  .chart-card .cs{font-size:.72rem;color:var(--muted);margin-bottom:14px;}
  .donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;}
  .legend{flex:1;min-width:150px;}
  .leg{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:.78rem;}
  .leg .sw{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
  .leg .ln{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .leg .lv{color:var(--muted);font-weight:500;font-size:.72rem;flex-shrink:0;}
  .empty-mini{text-align:center;color:var(--muted);font-size:.8rem;padding:30px 10px;line-height:1.5;}

  /* States */
  .state{text-align:center;padding:60px 20px;color:var(--muted);}
  .state .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .state h3{font-family:'Fraunces',serif;color:var(--text);font-weight:500;font-size:1.2rem;margin-bottom:8px;}
  .state p{font-size:.84rem;line-height:1.6;max-width:34ch;margin:0 auto;}
  .state code{background:var(--surface);border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:var(--accent);font-size:.76rem;}
  .state button{margin-top:16px;background:var(--accent);color:#3a2c08;border:none;font-family:'Roboto';font-weight:700;font-size:.8rem;padding:12px 24px;border-radius:999px;cursor:pointer;}

  /* Modal */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(20,24,16,.5);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;}
  .overlay.on{display:flex;animation:fade .25s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .msheet{background:var(--surface);border:1px solid var(--line);border-bottom:none;border-radius:26px 26px 0 0;width:100%;max-width:520px;
    padding:20px 20px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -20px 50px -10px rgba(20,24,16,.4);
    animation:slideup .35s cubic-bezier(.2,.85,.25,1);max-height:92dvh;overflow-y:auto;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 16px;}
  .msheet h3{font-family:'Fraunces',serif;font-weight:500;font-size:1.4rem;margin-bottom:3px;}
  .msheet .sh-sub{font-size:.76rem;color:var(--muted);margin-bottom:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.66rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);margin-bottom:7px;}
  [data-theme="dark"] .field label{color:var(--accent);}
  .field input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;color:var(--text);font-family:'Roboto';font-size:.95rem;padding:13px 14px;transition:.2s;}
  .field input:focus{outline:none;border-color:var(--accent);}
  .field input::placeholder{color:var(--muted-2);}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .err{color:var(--bad);font-size:.74rem;margin-bottom:12px;display:none;}.err.on{display:block;}
  .actions{display:flex;gap:10px;margin-top:6px;}
  .btn{flex:1;border:none;font-family:'Roboto';font-weight:700;font-size:.9rem;padding:15px;border-radius:16px;cursor:pointer;transition:.2s;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);flex:0 0 auto;padding:15px 20px;}
  .btn.go{background:var(--primary);color:#fff;}
  [data-theme="dark"] .btn.go{color:#10140e;}
  .btn:disabled{opacity:.55;}
  .toast{position:fixed;left:50%;transform:translateX(-50%) translateY(20px);bottom:calc(166px + env(safe-area-inset-bottom));
    background:var(--primary);color:#fff;font-size:.82rem;font-weight:600;padding:12px 20px;border-radius:999px;z-index:70;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow);}
  [data-theme="dark"] .toast{color:#10140e;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  footer{text-align:center;color:var(--muted-2);font-size:.68rem;margin-top:28px;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="tg" id="themeToggle" aria-label="Alternar tema">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
    </button>
    <img class="whale light" src="whale-light.png" alt="" aria-hidden="true">
    <img class="whale dark" src="whale-dark.png" alt="" aria-hidden="true">
    <h1 class="apptitle">Diagnóstico de Estudos</h1>
    <div class="appsub">Carreiras AGU</div>
    <div class="synced" id="syncBadge" style="display:none"><span class="dot"></span> Sincronizado com Google Sheets</div>
  </header>

  <div id="content">
    <div class="state"><div class="spin"></div><p>Carregando seus dados da planilha…</p></div>
  </div>
</div>

<template id="tpl-sections">
  <!-- 1 · VISÃO -->
  <section id="sec-visao" class="on">
    <div class="card hero">
      <div class="ring">
        <svg viewBox="0 0 104 104" width="104" height="104">
          <circle cx="52" cy="52" r="44" stroke="var(--line)" stroke-width="11" fill="none"/>
          <circle id="heroRing" cx="52" cy="52" r="44" stroke="var(--accent)" stroke-width="11" fill="none" stroke-linecap="round" stroke-dasharray="276.46" stroke-dashoffset="276.46"/>
        </svg>
        <div class="ctr"><div class="v" id="mAcerto">—</div><div class="l">acerto</div></div>
      </div>
      <div class="info">
        <div class="ey">Panorama</div>
        <div class="big" id="mTotalQ">—</div>
        <div class="sm" id="mResumo">questões resolvidas</div>
      </div>
    </div>

    <div class="secttl">Ritmo de estudo</div>
    <div class="card lrow">
      <div class="ic" style="background:var(--primary)"><svg viewBox="0 0 24 24"><path d="M3 8h18M7 3v3M17 3v3M5 6h14a2 2 0 012 2v11a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg></div>
      <div class="lb"><div class="t">Dias de estudo</div><div class="s">datas distintas registradas</div></div>
      <div class="val" id="mDias">—</div>
    </div>
    <div class="card lrow">
      <div class="ic" style="background:var(--accent)"><svg viewBox="0 0 24 24"><path d="M3 17l5-5 4 3 7-8M16 4h5v5"/></svg></div>
      <div class="lb"><div class="t">Média por dia</div><div class="s">questões resolvidas / dia</div></div>
      <div class="val" id="mPorDia">—</div>
    </div>

    <div class="secttl">Disciplinas em destaque</div>
    <div id="destaques"></div>
  </section>

  <!-- 2 · DIAGNÓSTICO -->
  <section id="sec-diag">
    <div class="h2"><span class="tag">Diagnóstico</span></div>
    <p class="lede">Ranqueado por <b style="color:var(--accent)">oportunidade</b> = baixo acerto × peso da frente. É onde cada hora rende mais.</p>
    <div class="block focus"><div class="block-head"><span class="pill red">Concentrar energia</span></div><div id="focusList"></div></div>
    <div class="insight" style="margin-bottom:16px" id="insightFocus"></div>
    <div class="block save"><div class="block-head"><span class="pill grn">Economizar energia</span></div><div id="saveList"></div></div>
    <div class="insight" id="insightSave"></div>
  </section>

  <!-- 3 · RANKING -->
  <section id="sec-rank">
    <div class="h2"><span class="tag">Ranking</span></div>
    <p class="lede">Todas as frentes. Toque para reordenar.</p>
    <div class="sortbar"><button class="chip on" data-sort="opp">Oportunidade</button><button class="chip" data-sort="acerto">Menor acerto</button><button class="chip" data-sort="q">Mais questões</button></div>
    <div id="rankList"></div>
  </section>

  <!-- 4 · FRENTES -->
  <section id="sec-disc">
    <div class="h2"><span class="tag">Frentes</span></div>
    <p class="lede">Médias ponderadas por questão. Toque para abrir os assuntos.</p>
    <div id="discList"></div>
  </section>

  <!-- 5 · GRÁFICOS -->
  <section id="sec-graf">
    <div class="h2"><span class="tag">Gráficos</span></div>
    <p class="lede">Distribuição e evolução. Filtre por disciplina e período.</p>
    <div class="filters">
      <div class="flab">Disciplina</div>
      <div class="chiprow" id="filtDisc"></div>
      <div class="flab">Período</div>
      <div class="chiprow" id="filtPer">
        <button class="chip on" data-per="0">Tudo</button>
        <button class="chip" data-per="90">90 dias</button>
        <button class="chip" data-per="30">30 dias</button>

    </div>
    <div class="card chart-card">
      <div class="ct" id="pieTitle">Distribuição de questões</div>

      <div id="pieArea"></div>

      <div class="ct">Evolução do acerto</div>
      <div class="cs">% ponderado por data de estudo</div>
      <div id="lineArea"></div>
    </div>

  </section>
</template>

<button class="fab" id="fab" style="display:none" aria-label="Adicionar registro"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>

<nav class="tabs" id="nav" style="display:none">
  <button class="tab on" data-sec="sec-visao"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg>Visão</button>
  <button class="tab" data-sec="sec-diag"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6" fill="currentColor"/></svg>Foco</button>
  <button class="tab" data-sec="sec-rank"><svg viewBox="0 0 24 24"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2"/></svg>Ranking</button>
  <button class="tab" data-sec="sec-disc"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="14" width="18" height="4" rx="1"/></svg>Frentes</button>
  <button class="tab" data-sec="sec-graf"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-9-9v9z"/><path d="M21 12a9 9 0 00-9-9"/></svg>Gráficos</button>
</nav>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="msheet">
    <div class="grab"></div>
    <h3>Novo registro</h3>
    <div class="sh-sub">Grava direto na sua planilha do Google Sheets.</div>
    <div class="err" id="formErr"></div>
    <div class="field"><label>Disciplina</label><input id="fDisc" list="discOptions" placeholder="ex.: Constitucional" autocomplete="off"><datalist id="discOptions"></datalist></div>
    <div class="field"><label>Matéria / Assunto</label><input id="fAssunto" placeholder="ex.: Poder Executivo" autocomplete="off"></div>
    <div class="field"><label>Data</label><input id="fData" type="date"></div>
    <div class="two">
      <div class="field"><label>Qtd. questões</label><input id="fQ" type="number" inputmode="numeric" min="1" placeholder="30"></div>
      <div class="field"><label>% de acerto</label><input id="fAcerto" type="number" inputmode="decimal" min="0" max="100" step="0.01" placeholder="75"></div>
    </div>
    <div class="actions"><button class="btn ghost" id="cancelBtn">Cancelar</button><button class="btn go" id="doneBtn">Concluir</button></div>
  </div>
</div>
<div class="toast" id="toast">Registro salvo ✓</div>

<script>
/* ======================================================================
   CONFIGURAÇÃO — cole aqui a URL do seu App da Web (a mesma /exec de antes)
   ====================================================================== */
const CONFIG = {
  url: "https://script.google.com/macros/s/AKfycby3UP855R6bWxgYxzP99hAJ-DNb8_unuPn_XsU_SE5Vlttx9Q_v1sEFPsN6y_-W0MRA/exec"
};
/* ====================================================================== */

let dadosRaw = [];   // linhas cruas da planilha
let dados = [];      // agregado por disciplina+assunto
let curSort = 'opp';
let fDiscSel = 'Todas';
let fPerSel = 0;

const PALETTE = ['#3C573F','#D9A441','#5F8163','#A8763E','#7C8C5A','#C98B5A','#4F6B52','#B4543E','#8a9b6a'];
const fmtPct = a => (a%1===0? a.toFixed(0) : a.toFixed(2).replace(/0$/,'')).replace('.',',');
const band = a => a>=85?'grn':a>=76?'amb':'red';
const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const bandColor = a => a>=85?cssVar('--good'):a>=76?cssVar('--warn'):cssVar('--bad');
function parseBR(s){ if(!s) return null; const p=String(s).split('/'); if(p.length!==3) return null;
  const d=+p[0],m=+p[1],y=+p[2]; const dt=new Date(y,m-1,d); return isNaN(dt)?null:dt; }

/* ---------- Conexão (idêntica à versão anterior) ---------- */
function loadFromSheet(){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+Math.floor(Math.random()*999);
    const s=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('timeout'));},12000);
    function cleanup(){clearTimeout(timer);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s);}
    window[cb]=resp=>{cleanup();resolve(resp);};
    s.onerror=()=>{cleanup();reject(new Error('network'));};
    s.src=CONFIG.url+'?callback='+cb+'&t='+Date.now();
    document.body.appendChild(s);
  });
}
async function saveToSheet(payload){
  await fetch(CONFIG.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
}

/* ---------- Agregações ---------- */
function aggregate(rows){
  const map={};
  rows.forEach(r=>{
    if(!r.assunto && !r.disc) return;
    const key=(r.disc+'|'+r.assunto).toLowerCase();
    if(!map[key]) map[key]={disc:r.disc,assunto:r.assunto,q:0,soma:0,data:r.data};
    map[key].q+=r.q; map[key].soma+=r.acerto/100*r.q; if(r.data) map[key].data=r.data;
  });
  return Object.values(map).map(x=>({disc:x.disc,assunto:x.assunto,q:x.q,data:x.data,
    acerto:x.q?+(x.soma/x.q*100).toFixed(2):0, opp:+((x.q-x.soma)).toFixed(1)}));
}
function byDiscipline(){
  const m={}; dados.forEach(d=>{
    if(!m[d.disc]) m[d.disc]={disc:d.disc,q:0,soma:0,items:[]};
    m[d.disc].q+=d.q; m[d.disc].soma+=d.acerto/100*d.q; m[d.disc].items.push(d);
  });
  return Object.values(m).map(x=>({disc:x.disc,q:x.q,acerto:x.q?x.soma/x.q*100:0,items:x.items}));
}

/* ====================== INIT ====================== */
async function init(){
  if(CONFIG.url.indexOf('COLE_AQUI')===0){ showSetup(); return; }
  try{
    const resp=await loadFromSheet();
    dadosRaw=resp.rows||[];
    dados=aggregate(dadosRaw);
    if(dados.length===0){ showEmpty(); return; }
    mountUI(); renderAll();
  }catch(err){ showError(err.message); }
}
function showSetup(){ document.getElementById('content').innerHTML=
  `<div class="state"><h3>Falta um passo</h3><p>Substitua <code>COLE_AQUI_A_URL_DO_APP_DA_WEB</code> pela URL do seu App da Web (a mesma de antes). Veja a explicação na conversa.</p></div>`; }
function showEmpty(){ mountUI(true); document.getElementById('content').innerHTML=
  `<div class="state"><h3>Planilha vazia</h3><p>Conexão funcionando! Toque no <b style="color:var(--accent)">+</b> para registrar seu primeiro lote.</p></div>`; }
function showError(){ document.getElementById('content').innerHTML=
  `<div class="state"><h3>Não consegui conectar</h3><p>Confira a URL e se o App da Web está publicado para <b>“Qualquer pessoa”</b>. Abra no navegador (Chrome/Safari), não na pré-visualização do app.</p><button onclick="location.reload()">Tentar de novo</button></div>`; }

function mountUI(minimal){
  if(!document.getElementById('sec-visao')){
    document.getElementById('content').replaceChildren(document.getElementById('tpl-sections').content.cloneNode(true));
  }
  document.getElementById('nav').style.display='flex';
  document.getElementById('fab').style.display='flex';
  if(!minimal) document.getElementById('syncBadge').style.display='inline-flex';
  bindNav(); bindSort(); bindFilters();
}

/* ====================== RENDER ====================== */
function renderAll(){ renderVisao(); renderDiag(); renderRank(); renderDisc(); renderGraf(); }

function renderVisao(){
  const totalQ=dadosRaw.reduce((s,r)=>s+(+r.q||0),0);
  const totalAcc=dadosRaw.reduce((s,r)=>s+(r.acerto/100*r.q),0);
  const acerto=totalQ?totalAcc/totalQ*100:0;
  const dias=new Set(dadosRaw.map(r=>r.data).filter(Boolean)).size;
  const porDia=dias?totalQ/dias:null;

  document.getElementById('mAcerto').textContent=acerto.toFixed(0)+'%';
  document.getElementById('mTotalQ').textContent=totalQ;
  document.getElementById('mResumo').textContent='questões resolvidas'+(dias?` · ${dias} ${dias>1?'dias':'dia'}`:'');
  document.getElementById('mDias').textContent=dias||'—';
  document.getElementById('mPorDia').textContent=porDia?(porDia%1===0?porDia:porDia.toFixed(1).replace('.',',')):'—';

  const C=2*Math.PI*44;
  const ring=document.getElementById('heroRing');
  requestAnimationFrame(()=>ring.style.transition='stroke-dashoffset 1.1s cubic-bezier(.2,.85,.25,1)');
  setTimeout(()=>ring.setAttribute('stroke-dashoffset', C*(1-acerto/100)),60);

  const dl=byDiscipline();
  const best=[...dl].sort((a,b)=>b.acerto-a.acerto)[0];
  const worst=[...dl].sort((a,b)=>a.acerto-b.acerto)[0];
  const most=[...dl].sort((a,b)=>b.q-a.q)[0];
  const least=[...dl].sort((a,b)=>a.q-b.q)[0];
  const ico={
    star:'<path d="M12 3l2.6 5.3 5.8.8-4.2 4.1 1 5.8L12 16.8 6.8 19l1-5.8L3.6 9.1l5.8-.8z"/>',
    alert:'<path d="M12 9v4M12 17h.01M10.3 3.9L2 18a2 2 0 001.7 3h16.6a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/>',
    up:'<path d="M3 17l6-6 4 4 8-8M21 11V7h-4"/>',
    down:'<path d="M3 7l6 6 4-4 8 8M21 13v4h-4"/>'
  };
  const rows=[
    {t:'Melhor desempenho',s:best.disc,v:best.acerto.toFixed(0)+'%',c:cssVar('--good'),i:ico.star},
    {t:'Maior dificuldade',s:worst.disc,v:worst.acerto.toFixed(0)+'%',c:cssVar('--bad'),i:ico.alert},
    {t:'Mais estudada',s:most.disc,v:most.q,c:cssVar('--primary'),i:ico.up},
    {t:'Menos estudada',s:least.disc,v:least.q,c:cssVar('--accent'),i:ico.down}
  ];
  document.getElementById('destaques').innerHTML=rows.map(r=>`
    <div class="card lrow"><div class="ic" style="background:${r.c}"><svg viewBox="0 0 24 24">${r.i}</svg></div>
      <div class="lb"><div class="t">${r.s}</div><div class="s">${r.t}</div></div>
      <div class="val" style="color:${r.c}">${r.v}</div></div>`).join('');
}

function renderDiag(){
  const focus=[...dados].sort((a,b)=>b.opp-a.opp).slice(0,3);
  const save=[...dados].sort((a,b)=>b.acerto-a.acerto).slice(0,3);
  const cl=a=>`color:${bandColor(a)}`;
  document.getElementById('focusList').innerHTML=focus.map((d,i)=>`
    <div class="row"><div class="rank">${i+1}</div>
      <div class="row-body"><div class="a">${d.assunto}</div><div class="d">${d.disc} · ${d.q} questões</div></div>
      <div class="metric"><div class="v" style="${cl(d.acerto)}">${fmtPct(d.acerto)}%</div><div class="c">≈${d.opp} a recuperar</div></div></div>`).join('');
  document.getElementById('saveList').innerHTML=save.map(d=>`
    <div class="row"><div class="rank">★</div>
      <div class="row-body"><div class="a">${d.assunto}</div><div class="d">${d.disc} · ${d.q} questões</div></div>
      <div class="metric"><div class="v" style="color:var(--good)">${fmtPct(d.acerto)}%</div><div class="c">manutenção</div></div></div>`).join('');
  const top=focus[0], best=save[0];
  document.getElementById('insightFocus').innerHTML=top?`⚠️ <strong>${top.assunto}</strong> lidera: ${fmtPct(top.acerto)}% sobre ${top.q} questões — cerca de <b>${top.opp} pontos</b> a ganhar. Frente pesada merece prioridade mesmo com erro moderado.`:'';
  document.getElementById('insightSave').innerHTML=best?`✅ Onde o acerto passa de 85% basta manutenção: revisão espaçada e poucas questões de reforço. <b>Realoque esse tempo</b> para as frentes em vermelho.`:'';
}

function renderRank(){
  const list=document.getElementById('rankList'); if(!list) return;
  const arr=[...dados].sort((a,b)=>curSort==='opp'?b.opp-a.opp:curSort==='acerto'?a.acerto-b.acerto:b.q-a.q);
  list.innerHTML=arr.map(d=>{const c=bandColor(d.acerto);return `
    <div class="card bar-item"><div class="bar-top">
      <div><div class="name">${d.assunto}</div><div class="disc">${d.disc}</div></div>
      <div class="pct" style="color:${c}">${fmtPct(d.acerto)}%</div></div>
      <div class="track"><div class="fill" data-w="${d.acerto}" style="background:${c}"></div></div>
      <div class="bar-foot"><span>${d.q} questões</span><span class="opp">${d.opp} a recuperar</span></div></div>`;}).join('');
  requestAnimationFrame(()=>list.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%'));
}

function renderDisc(){
  const list=document.getElementById('discList'); if(!list) return;
  const arr=byDiscipline().sort((a,b)=>a.acerto-b.acerto);
  list.innerHTML=arr.map(d=>{const c=bandColor(d.acerto);return `
    <div class="card acc"><div class="acc-head">
      <div class="acc-dot" style="background:${c}"></div>
      <div class="info2"><div class="nm">${d.disc}</div><div class="meta">${d.items.length} frente${d.items.length>1?'s':''} · ${d.q} questões</div></div>
      <div class="avg" style="color:${c}">${d.acerto.toFixed(0)}%</div>
      <svg class="chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>
      <div class="acc-body"><div class="acc-inner">
        ${d.items.sort((a,b)=>a.acerto-b.acerto).map(x=>`<div class="mini"><div class="mn">${x.assunto}<div class="mq">${x.q} questões</div></div><div class="mp" style="color:${bandColor(x.acerto)}">${fmtPct(x.acerto)}%</div></div>`).join('')}
      </div></div></div>`;}).join('');
  list.querySelectorAll('.acc-head').forEach(h=>h.addEventListener('click',()=>h.parentElement.classList.toggle('open')));
}

/* ---------- Gráficos ---------- */
function bindFilters(){
  const discs=['Todas',...new Set(dados.map(d=>d.disc))].filter(Boolean);
  document.getElementById('filtDisc').innerHTML=discs.map((d,i)=>`<button class="chip ${i===0?'on':''}" data-disc="${d}">${d}</button>`).join('');
  document.querySelectorAll('#filtDisc .chip').forEach(c=>c.onclick=()=>{
    document.querySelectorAll('#filtDisc .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');fDiscSel=c.dataset.disc;renderGraf();});
  document.querySelectorAll('#filtPer .chip').forEach(c=>c.onclick=()=>{
    document.querySelectorAll('#filtPer .chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');fPerSel=+c.dataset.per;renderGraf();});
}
function filteredRaw(){
  let rows=dadosRaw.slice();
  if(fDiscSel!=='Todas') rows=rows.filter(r=>r.disc===fDiscSel);
  if(fPerSel>0){ const cut=new Date(); cut.setDate(cut.getDate()-fPerSel);
    rows=rows.filter(r=>{const d=parseBR(r.data);return d&&d>=cut;}); }
  return rows;
}
function renderGraf(){ renderPie(); renderLine(); }

function renderPie(){
  const area=document.getElementById('pieArea'); if(!area) return;
  const rows=filteredRaw();
  const byKey={}; const useAssunto=fDiscSel!=='Todas';
  rows.forEach(r=>{const k=useAssunto?r.assunto:r.disc; byKey[k]=(byKey[k]||0)+(+r.q||0);});
  document.getElementById('pieSub').textContent=useAssunto?`por assunto · ${fDiscSel}`:'por disciplina';
  const segs=Object.entries(byKey).map(([label,value])=>({label,value})).filter(s=>s.value>0).sort((a,b)=>b.value-a.value);
  const total=segs.reduce((s,x)=>s+x.value,0);
  if(total===0){ area.innerHTML=`<div class="empty-mini">Sem questões no filtro escolhido.</div>`; return; }
  let cum=0;
  const arcs=segs.map((s,i)=>{const pct=s.value/total*100;const col=PALETTE[i%PALETTE.length];
    const c=`<circle cx="60" cy="60" r="42" fill="none" stroke="${col}" stroke-width="16" pathLength="100" stroke-dasharray="${pct.toFixed(3)} ${(100-pct).toFixed(3)}" stroke-dashoffset="${(-cum).toFixed(3)}" transform="rotate(-90 60 60)"/>`;
    cum+=pct; return c;}).join('');
  const legend=segs.map((s,i)=>`<div class="leg"><span class="sw" style="background:${PALETTE[i%PALETTE.length]}"></span><span class="ln">${s.label}</span><span class="lv">${s.value} · ${(s.value/total*100).toFixed(0)}%</span></div>`).join('');
  area.innerHTML=`<div class="donut-wrap">
    <svg viewBox="0 0 120 120" width="150" height="150">${arcs}
      <text x="60" y="56" text-anchor="middle" font-family="Fraunces" font-size="20" font-weight="600" fill="${cssVar('--text')}">${total}</text>
      <text x="60" y="72" text-anchor="middle" font-family="Roboto" font-size="8" letter-spacing="1" fill="${cssVar('--muted')}">QUESTÕES</text>
    </svg><div class="legend">${legend}</div></div>`;
}

function renderLine(){
  const area=document.getElementById('lineArea'); if(!area) return;
  const rows=filteredRaw().filter(r=>parseBR(r.data));
  if(rows.length===0){ area.innerHTML=`<div class="empty-mini">Adicione registros com <b>data</b> para ver a evolução do acerto ao longo do tempo.</div>`; return; }
  const byDate={};
  rows.forEach(r=>{const k=r.data; if(!byDate[k]) byDate[k]={q:0,soma:0,dt:parseBR(r.data)}; byDate[k].q+=r.q; byDate[k].soma+=r.acerto/100*r.q;});
  const pts=Object.entries(byDate).map(([label,v])=>({label,dt:v.dt,val:v.q?v.soma/v.q*100:0})).sort((a,b)=>a.dt-b.dt);

  const W=320,H=180,pl=34,pr=12,pt=14,pb=26, iw=W-pl-pr, ih=H-pt-pb;
  const n=pts.length;
  const x=i=> n<=1? pl+iw/2 : pl+iw*i/(n-1);
  const y=v=> pt+ih*(1-v/100);
  const grid=[0,25,50,75,100].map(g=>`<line x1="${pl}" y1="${y(g)}" x2="${W-pr}" y2="${y(g)}" stroke="${cssVar('--line')}" stroke-width="1"/><text x="${pl-6}" y="${y(g)+3}" text-anchor="end" font-family="Roboto" font-size="8" fill="${cssVar('--muted')}">${g}</text>`).join('');
  const acc=cssVar('--accent'), prim=cssVar('--primary');
  let line='', dots='', area2='';
  if(n===1){ dots=`<circle cx="${x(0)}" cy="${y(pts[0].val)}" r="5" fill="${acc}"/>`; }
  else{
    const path=pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(p.val).toFixed(1)}`).join(' ');
    line=`<path d="${path}" fill="none" stroke="${prim}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    area2=`<path d="${path} L${x(n-1).toFixed(1)} ${pt+ih} L${x(0).toFixed(1)} ${pt+ih} Z" fill="${acc}" opacity="0.12"/>`;
    dots=pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.val).toFixed(1)}" r="3.4" fill="${acc}" stroke="${cssVar('--surface')}" stroke-width="1.5"/>`).join('');
  }
  const showLabels = n<=6;
  const xlabels=pts.map((p,i)=>{ if(!showLabels && i!==0 && i!==n-1) return ''; const dm=p.label.slice(0,5);
    const anchor = i===0?'start':i===n-1?'end':'middle';
    return `<text x="${x(i).toFixed(1)}" y="${H-8}" text-anchor="${anchor}" font-family="Roboto" font-size="8" fill="${cssVar('--muted')}">${dm}</text>`;}).join('');
  area.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%">${grid}${area2}${line}${dots}${xlabels}</svg>`;
}

/* ====================== INTERAÇÕES ====================== */
function bindNav(){
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('section').forEach(s=>s.classList.remove('on'));
    t.classList.add('on'); const sec=document.getElementById(t.dataset.sec); if(sec)sec.classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
    if(t.dataset.sec==='sec-rank') renderRank();
    if(t.dataset.sec==='sec-graf') renderGraf();
    if(t.dataset.sec==='sec-visao') renderVisao();
  });
}
function bindSort(){
  document.querySelectorAll('.sortbar .chip').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.sortbar .chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');curSort=b.dataset.sort;renderRank();});
}

/* Tema */
const html=document.documentElement;
try{const saved=localStorage.getItem('estuda-theme'); if(saved) html.setAttribute('data-theme',saved);}catch(e){}
function setThemeIcon(){
  const dark=html.getAttribute('data-theme')==='dark';
  document.getElementById('themeIcon').innerHTML = dark
    ? '<path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/>'
    : '<circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>';
}
setThemeIcon();
document.getElementById('themeToggle').onclick=()=>{
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  try{localStorage.setItem('estuda-theme',dark?'light':'dark');}catch(e){}
  setThemeIcon();
  if(dados.length){ renderRank(); renderDisc(); renderGraf(); renderVisao(); renderDiag(); }
};

/* Modal */
const overlay=document.getElementById('overlay');
function openForm(){
  document.getElementById('fData').value=new Date().toISOString().slice(0,10);
  const discs=[...new Set(dados.map(d=>d.disc))].filter(Boolean);
  document.getElementById('discOptions').innerHTML=discs.map(d=>`<option value="${d}">`).join('');
  document.getElementById('formErr').classList.remove('on');
  overlay.classList.add('on');
}
document.getElementById('fab').onclick=openForm;
document.getElementById('cancelBtn').onclick=()=>overlay.classList.remove('on');
overlay.onclick=e=>{if(e.target===overlay)overlay.classList.remove('on');};
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}
document.getElementById('doneBtn').onclick=async function(){
  const disc=fDisc.value.trim(),assunto=fAssunto.value.trim(),dataISO=fData.value;
  const q=parseInt(fQ.value,10),acerto=parseFloat(fAcerto.value);const err=document.getElementById('formErr');
  if(!disc||!assunto||!dataISO||!q||isNaN(acerto)){err.textContent='Preencha todos os campos.';err.classList.add('on');return;}
  if(acerto<0||acerto>100){err.textContent='O acerto deve estar entre 0 e 100.';err.classList.add('on');return;}
  err.classList.remove('on');
  const[y,mo,da]=dataISO.split('-');const dataBR=`${da}/${mo}/${y}`;
  this.disabled=true;this.textContent='Salvando…';
  try{
    await saveToSheet({disc,assunto,data:dataBR,q,acerto});
    overlay.classList.remove('on'); showToast('Registro salvo ✓');
    fAssunto.value='';fQ.value='';fAcerto.value='';
    setTimeout(async()=>{try{const resp=await loadFromSheet();dadosRaw=resp.rows||[];dados=aggregate(dadosRaw);
      if(!document.getElementById('sec-visao'))mountUI();
      document.getElementById('syncBadge').style.display='inline-flex';renderAll();}catch(e){location.reload();}},1400);
  }catch(e){err.textContent='Não consegui salvar. Confira a publicação do App da Web.';err.classList.add('on');}
  finally{this.disabled=false;this.textContent='Concluir';}
};
const fDisc=document.getElementById('fDisc'),fAssunto=document.getElementById('fAssunto'),
  fData=document.getElementById('fData'),fQ=document.getElementById('fQ'),fAcerto=document.getElementById('fAcerto');

init();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
